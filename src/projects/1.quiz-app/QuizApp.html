<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../../style.css" />
    <style>
      .custom-progress {
        width: 100%;
        height: 12px;
        appearance: none;
        -webkit-appearance: none;
      }

      .custom-progress::-webkit-progress-bar {
        background-color: #e5e7eb;
        /* track color */
        border-radius: 9999px;
      }

      .custom-progress::-webkit-progress-value {
        background-color: #22c55e;
        /* progress color */
        border-radius: 9999px;
      }

      .custom-progress::-moz-progress-bar {
        background-color: #22c55e;
        /* Firefox */
        border-radius: 9999px;
      }
    </style>
  </head>

  <body>
    <div
      id="main"
      class="h-screen w-screen flex justify-center items-center bg-[#f5efe6]"
    >
      <div
        id="home"
        class="flex flex-col bg-[#ecdede] p-20 justify-center items-center rounded-4xl"
      >
        <h1 class="text-[#e86a33] font-extrabold text-4xl m-5 p-[15px]">
          Quiz Time!
        </h1>
        <p class="mb-7">Test your knowledge with these fun questions</p>
        <button
          id="homeButton"
          class="bg-[#e86a33] text-white pt-[15px] pb-[15px] pr-[30px] pl-[30px] rounded-2xl"
        >
          Start Quiz
        </button>
      </div>
      <!--+++++++++++++++questionPage++++++++++++++++++++++++++++++++++++++++++++++++++++++++++-->
      <div
        id="questionPage"
        class="flex flex-col bg-[#ffffff] p-5 justify-center items-center rounded-4xl w-150"
      >
        <div id="question" class="text-center font-semibold text-2xl">
          What is the capital of France?
        </div>
        <div
          class="flex flex-row justify-between gap-9 w-[100%] pr-3 pl-3 m-4 text-gray-500 font-medium text-[13px]"
        >
          <div>
            question <span id="current">1</span> of <span id="quantity"> </span>
          </div>
          <div>score <span id="score">0</span></div>
        </div>
        <div id="options" class="w-[100%] flex flex-col gap-2 items-center">
          <button
            id="op1"
            class="bg-[#f8f0e5] w-[100%] p-4 rounded-md border-2 border-[#eadbc8] text-left"
            value="option1"
          >
            london
          </button>
          <button
            id="op2"
            class="bg-[#f8f0e5] w-[100%] p-4 rounded-md border-2 border-[#eadbc8] text-left"
            value="option2"
          >
            london
          </button>
          <button
            id="op3"
            class="bg-[#f8f0e5] w-[100%] p-4 rounded-md border-2 border-[#eadbc8] text-left"
            value="option3"
          >
            london
          </button>
          <button
            id="op4"
            class="bg-[#f8f0e5] w-[100%] p-4 rounded-md border-2 border-[#eadbc8] text-left"
            value="option4"
          >
            london
          </button>
        </div>

        <div id="answer">
          <!-- answer goes here-->
        </div>
        <progress
            id="progressBar"
          class="w-[100%] mt-7 mb-5 custom-progress"
          value="0"
          max="5"
        ></progress>
      </div>

      <!--result page here+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++       -->
      <div
        id="resultPage"
        class="flex flex-col bg-[#ffffff] p-5 justify-center items-center rounded-4xl w-150"
      >
        <h1 class="text-3xl font-medium p-5">quiz results</h1>
        <div class="bg-[#f8f0e5] w-full flex flex-col items-center p-5">
          <div>
            you scored <span id="resultScore">3</span> out of
            <span id="resultQuantity"></span>
          </div>
          <div
            id="resultQuote"
            class="text-3xl text-amber-500 font-medium p-5"
          ></div>
        </div>
        <button
          id="resultResetBtn"
          class="bg-amber-500 text-amber-50 p-5 m-5 rounded-2xl"
        >
          Restart quiz
        </button>
      </div>
    </div>

    <script type="module">
      //  var questionSets =[{question:"What is the capital of France?", option1:{data:"London", valid:false },option2:{data:"berlin", valid:false },option3:{data:"paris", valid:true } ,option4:{data:"berlin", valid:false } }]
      var questionSets = [
        {

          option1: { data: "Venus", valid: false },

        {

        },

          option4: { data: "Gold", valid: false },
        },
      ];

      const questionPage = document.querySelector("#questionPage");
      questionPage.style.display = "none";
      const question = document.querySelector("#question"); //innerhtml
      const current = document.querySelector("#current"); //innerhtml
      const quantity = document.querySelector("#quantity"); //innerhtml
      quantity.innerHTML = questionSets.length;
      const score = document.querySelector("#score"); //innerhtml

      const op1 = document.querySelector("#op1"); //innerhtml & value

      const progressBar = document.querySelector("#progressBar"); //value & max

      let currentV = 0;

       let num = 0;
      let show = () => {
          if(num>4){

            return
        }
        question.innerHTML = questionSets[num].question;

        op2.innerHTML = questionSets[num].option2.data;
        op3.innerHTML = questionSets[num].option3.data;
        op4.innerHTML = questionSets[num].option4.data;
        current.innerHTML = num;
        score.innerHTML = scoreV;
         progressBar.value = num;
      console.log(progressBar);
      
         progressBar.max=questionSets.length
      };
     let showResult=()=>{
 questionPage.style.display = "none";
              resultPage.style.display = "flex";
          resultScore.innerHTML=scoreV;


     }
      // result page

      const resultPage = document.querySelector("#resultPage"); //innerhtml
      resultPage.style.display = "none";
      const resultScore = document.querySelector("#resultScore"); //innerhtml
      const resultQuantity = document.querySelector("#resultQuantity"); //innerhtml
      resultQuantity.innerHTML = questionSets.length;
      const resultQuote = document.querySelector("#resultQuote");
      resultQuote.innerHTML = "goood effort nerds";
      const resultResetBtn = document.querySelector("#resultResetBtn"); //innerhtml

      // document.querySelector("#home").style.display = "none";

      document.querySelector("#homeButton").addEventListener("click", () => {
        //   document.querySelector("#homeButton").style.backgroundColor="#fff"

        document.querySelector("#home").style.display = "none";
        Quiz();
      });

     
      const Quiz = () => {
        questionPage.style.display = "flex";
        show();
      };

      op1.addEventListener("click", (e) => {
        
        if (questionSets[num].option1.valid) {
          //alway change option
          console.log(e.target.value);
          currentV++;
          scoreV++;

          num++;

          show();
        } else {
          num++;
          show();
        }
      });
 op2.addEventListener("click", (e) => {



        if (questionSets[num].option2.valid) {
          //alway change option
          console.log(e.target.value);
          currentV++;
          scoreV++;

          num++;

          show();
        } else {
          num++;
          show();
        }
      });

 op3.addEventListener("click", (e) => {
        if (questionSets[num].option3.valid) {
          //alway change option
          console.log(e.target.value);
          currentV++;
          scoreV++;

          num++;

          show();
        } else {
          num++;
          show();
        }
      });
 op4.addEventListener("click", (e) => {
        if (questionSets[num].option4.valid) {
          //alway change option
          console.log(e.target.value);
          currentV++;
          scoreV++;

          num++;

          show();
        } else {
          num++;
          show();
        }
      });



    </script>
  </body>
</html>
